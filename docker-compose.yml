services:
  postgres:
    image: postgres:16-alpine
    container_name: ellbopa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ellbopa_studio
    ports:
      - "5432:5432"
    volumes:
      - ellbopa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ellbopa_studio"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  ellbopa_postgres_data:
